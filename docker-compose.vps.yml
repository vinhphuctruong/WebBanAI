services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlv_node}
      POSTGRES_USER: ${POSTGRES_USER:-mlv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - pg_node_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlv} -d ${POSTGRES_DB:-mlv_node}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_node_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.adminCommand(\"ping\").ok' | mongosh --quiet --host localhost:27017 | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend-node
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      PORT: 8080
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mlv_node}
      POSTGRES_USER: ${POSTGRES_USER:-mlv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/mlv_content}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_32_plus_random_chars}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      BANK_NAME: ${BANK_NAME:-Vietcombank}
      BANK_ACCOUNT_NAME: ${BANK_ACCOUNT_NAME:-CONG TY TM SOFTWARE AI}
      BANK_ACCOUNT_NUMBER: ${BANK_ACCOUNT_NUMBER:-1900000000000}
      BANK_BRANCH: ${BANK_BRANCH:-TP.HCM}
      BANK_QR_IMAGE_URL: ${BANK_QR_IMAGE_URL:-}
      SALES_ZALO_LINK: ${SALES_ZALO_LINK:-}
      SALES_TELEGRAM_LINK: ${SALES_TELEGRAM_LINK:-}
      SALES_PHONE: ${SALES_PHONE:-}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-CGXZLS0Z}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-RAOEXHYVSDDILENYWSLDIIZTANXUXZFJ}
      VNPAY_PAYMENT_URL: ${VNPAY_PAYMENT_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMO}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-F8BBA842ECF85}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-K951B6PE1waDMi640xX08PD3vg6EkVlz}
      MOMO_API_ENDPOINT: ${MOMO_API_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL:-}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      API_BASE_URL: ${API_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-react
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    depends_on:
      - backend

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx.vps.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pg_node_data:
  mongo_node_data:
