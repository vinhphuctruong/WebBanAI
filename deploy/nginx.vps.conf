# ── HTTP: redirect sang HTTPS + ACME challenge ──
server {
  listen 80;
  server_name aivideo.vinhphucdev.id.vn;

  # Let's Encrypt xác thực domain qua đường này
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Mọi request khác → redirect HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS: main server ──
server {
  listen 443 ssl;
  http2 on;
  server_name aivideo.vinhphucdev.id.vn;

  # ── SSL certs (Let's Encrypt) ──
  ssl_certificate     /etc/letsencrypt/live/aivideo.vinhphucdev.id.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/aivideo.vinhphucdev.id.vn/privkey.pem;

  # ── SSL hardening ──
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ── Security headers ──
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  client_max_body_size 20m;

  # ── Gzip ──
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;
  gzip_vary on;

  # ── API backend ──
  location = /api {
    return 301 /api/;
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ── Frontend Next.js ──
  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }
}
