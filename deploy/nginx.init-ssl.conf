# Config tạm – chỉ dùng lần đầu để lấy cert Let's Encrypt
# Sau khi có cert, file này không còn dùng nữa
server {
  listen 80;
  server_name aivideo.vinhphucdev.id.vn;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 200 'SSL setup in progress...';
    add_header Content-Type text/plain;
  }
}
