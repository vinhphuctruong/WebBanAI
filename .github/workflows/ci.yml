name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-node/package-lock.json

      - name: Install backend deps
        working-directory: backend-node
        run: npm ci

      - name: Syntax check backend
        run: |
          find backend-node/src -name "*.js" -print0 | xargs -0 -n1 node --check

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install frontend deps
        working-directory: frontend-react
        run: npm ci

      - name: Build frontend
        working-directory: frontend-react
        run: npm run build
